<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Adsy - CRM Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; color: #1a1a1a; }
        .header p { color: #666; font-size: 14px; }

        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }

        .filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
        .form-group { margin-bottom: 0; }
        .form-label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #333; }
        .form-input, .form-select { padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; }
        .form-input:focus, .form-select:focus { outline: none; border-color: #4F46E5; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #4F46E5; color: white; }
        .btn-primary:hover { background: #4338CA; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-success { background: #10B981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-sm { padding: 8px 16px; font-size: 13px; }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #F9FAFB; padding: 12px; text-align: left; font-weight: 600; color: #666; border-bottom: 2px solid #e0e0e0; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #FAFAFA; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .badge-blue { background: #EEF2FF; color: #4F46E5; }
        .badge-green { background: #D1FAE5; color: #059669; }
        .badge-yellow { background: #FEF3C7; color: #D97706; }
        .badge-red { background: #FEE2E2; color: #DC2626; }
        .badge-purple { background: #F3E8FF; color: #7C3AED; }
        .badge-cyan { background: #CFFAFE; color: #0891B2; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 20px; }
        .pagination span { font-size: 13px; color: #666; }

        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .toolbar-right { margin-left: auto; font-size: 13px; font-weight: 600; color: #4F46E5; }

        .logout { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .loading { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>
    <button onclick="logout()" class="btn btn-secondary btn-sm logout">Logout</button>

    <div class="container">
        <div class="header">
            <div>
                <h1>📦 Orderan Saya</h1>
                <p>Lihat dan download orderan yang di-assign ke Anda</p>
            </div>
            <button onclick="loadOrders()" class="btn btn-secondary btn-sm">🔄 Refresh</button>
        </div>

        <!-- Filters -->
        <div class="card">
            <div class="filters">
                <div class="form-group" style="flex: 2; min-width: 200px;">
                    <label class="form-label">Cari</label>
                    <input type="text" id="searchInput" class="form-input" placeholder="🔍 Nama / HP / Resi..." oninput="applyFilters()">
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="statusFilter" class="form-select" onchange="applyFilters()">
                        <option value="">Semua</option>
                        <option value="Pending">Pending</option>
                        <option value="Processing">Processing</option>
                        <option value="Shipped">Shipped</option>
                        <option value="Delivered">Delivered</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div style="padding-top: 22px;">
                    <button onclick="clearFilters()" class="btn btn-secondary">✖ Reset</button>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button onclick="exportToCSV()" class="btn btn-success btn-sm">📥 Download CSV</button>
            <button onclick="selectAll()" class="btn btn-secondary btn-sm">☑️ Pilih Semua</button>
            <button onclick="deselectAll()" class="btn btn-secondary btn-sm">☐ Batal Pilih</button>
            <select id="rowsPerPage" class="form-select" style="width: auto;" onchange="changeRowsPerPage()">
                <option value="20">20 / halaman</option>
                <option value="50">50 / halaman</option>
                <option value="100">100 / halaman</option>
            </select>
            <span class="toolbar-right" id="selectedCount">0 dipilih</span>
        </div>

        <div id="paginationInfo" style="margin-bottom: 10px; font-size: 12px; color: #666;"></div>

        <!-- Table -->
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th>
                            <th>Tanggal</th>
                            <th>Nama</th>
                            <th>No HP</th>
                            <th>Produk</th>
                            <th>Kabupaten</th>
                            <th>Provinsi</th>
                            <th>Pesanan</th>
                            <th>Pembayaran</th>
                            <th>Resi</th>
                            <th>Status</th>
                            <th>CS</th>
                        </tr>
                    </thead>
                    <tbody id="orderTbody">
                        <tr><td colspan="12" class="loading">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let sbData, sbApp;
        let currentUser = null;
        let allOrders = [];
        let filteredOrders = [];
        let displayedOrders = [];
        let selectedOrders = new Set();
        let currentPage = 1;
        let rowsPerPage = 20;

        // Init
        window.onload = async function() {
            await initSupabase();
            const stored = sessionStorage.getItem('user');
            if (!stored) { window.location.href = 'index.html'; return; }
            currentUser = JSON.parse(stored);
            if (currentUser.role !== 'crm') { alert('Akses ditolak!'); logout(); return; }
            await loadOrders();
        };

        async function initSupabase() {
            try {
                const response = await fetch('/api/config');
                const CONFIG = await response.json();
                const { createClient } = supabase;
                sbData = createClient(CONFIG.DATA_SUPABASE_URL, CONFIG.DATA_SUPABASE_KEY);
                sbApp  = createClient(CONFIG.APP_SUPABASE_URL, CONFIG.APP_SUPABASE_KEY);
            } catch (error) {
                alert('Failed to load config: ' + error.message);
            }
        }

        async function loadOrders() {
            const tb = document.getElementById('orderTbody');
            tb.innerHTML = '<tr><td colspan="12" class="loading">Memuat data...</td></tr>';

            // Get assignments
            const { data: assignments } = await sbApp.from('crm_assignments').select('*').eq('crm_name', currentUser.username);
            if (!assignments || !assignments.length) {
                tb.innerHTML = '<tr><td colspan="12" class="loading">Belum ada assignment dari admin</td></tr>';
                return;
            }

            // Load orders from crm_customer_orders first (faster)
            let orders = [];
            let page = 0, hasMore = true;
            while (hasMore) {
                const { data } = await sbApp.from('crm_customer_orders').select('*')
                    .eq('crm_name', currentUser.username)
                    .range(page * 1000, (page + 1) * 1000 - 1);
                if (data && data.length > 0) {
                    orders = orders.concat(data.map(o => ({
                        ...o,
                        id: o.orderan_id,
                        hp: o.no_hp,
                        created_at: o.tgl_created
                    })));
                    hasMore = data.length === 1000;
                    page++;
                } else hasMore = false;
            }

            // Fallback to all_orderan if empty
            if (!orders.length) {
                const uniqueCS = [...new Set(assignments.map(a => a.cs_name))];
                const dates = assignments.map(a => ({ from: a.date_from, to: a.date_to }));
                const minDate = dates.reduce((m, r) => r.from < m ? r.from : m, dates[0].from);
                const maxDate = dates.reduce((m, r) => r.to > m ? r.to : m, dates[0].to);
                const fromUTC = new Date(minDate + 'T00:00:00+07:00').toISOString();
                const toUTC = new Date(maxDate + 'T23:59:59+07:00').toISOString();

                let pg = 0, more = true;
                while (more) {
                    const { data } = await sbData.from('all_orderan').select('*')
                        .ilike('sumber', 'Validasi')
                        .in('cs', uniqueCS)
                        .gte('created_at', fromUTC)
                        .lte('created_at', toUTC)
                        .range(pg * 1000, (pg + 1) * 1000 - 1);
                    if (data && data.length > 0) {
                        orders = orders.concat(data);
                        more = data.length === 1000;
                        pg++;
                    } else more = false;
                }
            }

            // Filter by assignment
            const matching = orders.filter(o => {
                const produk = extractProduk(o.jumlah) || o.produk;
                if (!produk) return false;
                const dateStr = o.created_at ? new Date(new Date(o.created_at).getTime() + 7 * 3600 * 1000).toISOString().slice(0, 10) : null;
                if (!dateStr) return false;
                return assignments.some(a =>
                    normEq(a.cs_name, o.cs) &&
                    normEq(a.produk, produk) &&
                    dateStr >= a.date_from &&
                    dateStr <= a.date_to
                );
            });

            // Deduplicate by id
            allOrders = Array.from(new Map(matching.map(i => [i.id, i])).values());
            allOrders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            filteredOrders = allOrders.filter(o => {
                if (search && !(o.nama?.toLowerCase().includes(search) || o.hp?.includes(search) || o.resi?.toLowerCase().includes(search))) return false;
                if (status && o.status !== status) return false;
                return true;
            });

            currentPage = 1;
            renderTable();
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            applyFilters();
        }

        function changeRowsPerPage() {
            rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const total = filteredOrders.length;
            const totalPages = Math.ceil(total / rowsPerPage);
            const start = (currentPage - 1) * rowsPerPage;
            displayedOrders = filteredOrders.slice(start, start + rowsPerPage);

            document.getElementById('paginationInfo').textContent =
                `Menampilkan ${total > 0 ? start + 1 : 0}–${Math.min(start + rowsPerPage, total)} dari ${total} orderan`;

            const tb = document.getElementById('orderTbody');
            if (!displayedOrders.length) {
                tb.innerHTML = '<tr><td colspan="12" class="loading">Tidak ada data</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tb.innerHTML = displayedOrders.map(o => {
                const dateStr = o.created_at ? new Date(new Date(o.created_at).getTime() + 7 * 3600 * 1000).toISOString().slice(0, 10) : '';
                const produk = extractProduk(o.jumlah) || '-';
                const statusColor = {
                    'Pending': 'yellow',
                    'Processing': 'purple',
                    'Shipped': 'cyan',
                    'Delivered': 'green',
                    'Cancelled': 'red'
                }[o.status] || 'blue';
                const checked = selectedOrders.has(o.id);

                return `<tr style="${checked ? 'background: #F9FAFB;' : ''}">
                    <td><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleOrder(${o.id})"></td>
                    <td style="font-size: 12px;">${dateStr}</td>
                    <td style="font-weight: 600;">${escapeHtml(o.nama || '-')}</td>
                    <td style="font-size: 12px;">${escapeHtml(o.hp || '-')}</td>
                    <td><span class="badge badge-blue">${escapeHtml(produk)}</span></td>
                    <td style="font-size: 12px;">${escapeHtml(o.kabupaten || '-')}</td>
                    <td style="font-size: 12px;">${escapeHtml(o.provinsi || '-')}</td>
                    <td style="font-size: 12px; max-width: 140px; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(o.pesanan || o['jumlah pesanan'] || '-')}</td>
                    <td style="font-size: 12px;">${escapeHtml(o.pembayaran || '-')}</td>
                    <td style="font-size: 11px; font-weight: 600;">${escapeHtml(o.resi || '-')}</td>
                    <td><span class="badge badge-${statusColor}">${escapeHtml(o.status || '-')}</span></td>
                    <td style="font-size: 12px;">${escapeHtml(o.cs || '-')}</td>
                </tr>`;
            }).join('');

            // Pagination
            const pg = document.getElementById('pagination');
            if (totalPages > 1) {
                pg.innerHTML = `
                    <button onclick="goPage(${currentPage - 1})" class="btn btn-secondary btn-sm" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>
                    <span>Halaman ${currentPage} / ${totalPages}</span>
                    <button onclick="goPage(${currentPage + 1})" class="btn btn-secondary btn-sm" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>
                `;
            } else {
                pg.innerHTML = '';
            }

            updateSelectedCount();
        }

        function goPage(page) {
            const totalPages = Math.ceil(filteredOrders.length / rowsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }

        function toggleOrder(id) {
            if (selectedOrders.has(id)) selectedOrders.delete(id);
            else selectedOrders.add(id);
            renderTable();
        }

        function toggleSelectAll() {
            const cb = document.getElementById('selectAllCheckbox');
            if (cb.checked) displayedOrders.forEach(o => selectedOrders.add(o.id));
            else displayedOrders.forEach(o => selectedOrders.delete(o.id));
            renderTable();
        }

        function selectAll() {
            displayedOrders.forEach(o => selectedOrders.add(o.id));
            document.getElementById('selectAllCheckbox').checked = true;
            renderTable();
        }

        function deselectAll() {
            selectedOrders.clear();
            document.getElementById('selectAllCheckbox').checked = false;
            renderTable();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = `${selectedOrders.size} dipilih`;
        }

        function exportToCSV() {
            const sel = allOrders.filter(o => selectedOrders.has(o.id));
            if (!sel.length) { alert('Pilih orderan terlebih dahulu!'); return; }

            const csv = [
                ['Tanggal', 'Nama', 'No HP', 'Produk', 'Kabupaten', 'Provinsi', 'Pesanan', 'Pembayaran', 'Resi', 'Status', 'CS'].join(','),
                ...sel.map(o => {
                    const dateStr = o.created_at ? new Date(new Date(o.created_at).getTime() + 7 * 3600 * 1000).toISOString().slice(0, 10) : '';
                    return [
                        dateStr,
                        `"${(o.nama || '').replace(/"/g, '""')}"`,
                        o.hp || '',
                        `"${(extractProduk(o.jumlah) || '').replace(/"/g, '""')}"`,
                        o.kabupaten || '',
                        o.provinsi || '',
                        `"${(o.pesanan || o['jumlah pesanan'] || '').replace(/"/g, '""')}"`,
                        o.pembayaran || '',
                        o.resi || '',
                        o.status || '',
                        o.cs || ''
                    ].join(',');
                })
            ].join('\n');

            const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `orderan_${currentUser.username}_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            alert(`✅ ${sel.length} orderan berhasil di-download!`);
        }

        function extractProduk(str) {
            if (!str) return null;
            const m = str.match(/\b(DIABCARE|URICARE|GASTRIC|STROCAV|DIALIVE)\b/i);
            return m ? m[0].toUpperCase() : null;
        }

        function norm(s) { return s ? s.trim().replace(/\s+/g, ' ') : ''; }
        function normEq(a, b) { return norm(a).toLowerCase() === norm(b).toLowerCase(); }
        function escapeHtml(str) { return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        function logout() {
            sessionStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
