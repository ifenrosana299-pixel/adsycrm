<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Adsy - Login Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .error-msg {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .loading {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 16px;
        }
        .version-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">🤖 CRM Adsy</div>
        <div class="login-subtitle">Simple Version</div>

        <div id="errorMsg" class="error-msg"></div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="loginUsername" class="form-input" placeholder="Masukkan username" onkeydown="if(event.key==='Enter') login()">
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password" onkeydown="if(event.key==='Enter') login()">
        </div>

        <button onclick="login()" class="btn btn-primary" id="loginBtn">LOGIN</button>

        <div id="loadingMsg" class="loading" style="display: none;">Memuat konfigurasi...</div>

        <div class="version-badge">
            Default Login: admin / admin123<br>
            CRM: crm_user1 / crm123
        </div>
    </div>

    <script>
        let sbApp;

        window.onload = async function() {
            // Check if already logged in
            const stored = sessionStorage.getItem('user');
            if (stored) {
                const user = JSON.parse(stored);
                redirectUser(user);
                return;
            }

            // Init Supabase
            await initSupabase();
        };

        async function initSupabase() {
            try {
                document.getElementById('loadingMsg').style.display = 'block';

                const response = await fetch('/api/config');
                if (!response.ok) throw new Error('Failed to fetch config');

                const CONFIG = await response.json();
                const { createClient } = supabase;
                sbApp = createClient(CONFIG.APP_SUPABASE_URL, CONFIG.APP_SUPABASE_KEY);

                document.getElementById('loadingMsg').style.display = 'none';
            } catch (error) {
                console.error('Init error:', error);
                showError('Gagal memuat konfigurasi. Pastikan environment variables sudah diset. Error: ' + error.message);
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                showError('Username dan password harus diisi!');
                return;
            }

            if (!sbApp) {
                showError('Supabase belum terinisialisasi. Refresh halaman dan coba lagi.');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Memuat...';
            hideError();

            try {
                const { data, error } = await sbApp
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();

                if (error) throw error;

                if (!data) {
                    showError('Username atau password salah!');
                    btn.disabled = false;
                    btn.textContent = 'LOGIN';
                    return;
                }

                // Save to session
                sessionStorage.setItem('user', JSON.stringify(data));

                // Redirect
                redirectUser(data);

            } catch (error) {
                console.error('Login error:', error);
                showError('Login gagal: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'LOGIN';
            }
        }

        function redirectUser(user) {
            if (user.role === 'admin') {
                window.location.href = 'admin_simple.html';
            } else if (user.role === 'crm') {
                window.location.href = 'crm_simple.html';
            } else {
                showError('Role tidak dikenali: ' + user.role);
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>
</body>
</html>
